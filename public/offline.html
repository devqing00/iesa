<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — IESA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F5FA;
      color: #0F0F2D;
    }
    .card {
      background: #fff;
      border: 4px solid #0F0F2D;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 420px;
      box-shadow: 8px 8px 0 0 #000;
    }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
    p { color: #555; margin-bottom: 24px; line-height: 1.5; }
    button {
      background: #C8F31D;
      border: 4px solid #0F0F2D;
      border-radius: 16px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 900;
      color: #0F0F2D;
      cursor: pointer;
      box-shadow: 5px 5px 0 0 #0F0F2D;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button:active {
      transform: translate(5px, 5px);
      box-shadow: 0 0 0 0 #0F0F2D;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You&rsquo;re Offline</h1>
    <p>It looks like you&rsquo;ve lost your internet connection. Some cached content may still be available.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
